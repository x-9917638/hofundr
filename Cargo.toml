[package]
name = "hofundr"
version = "0.1.0"
edition = "2024"

[dependencies]
actix-web = "4.12.1"
heed = "0.22.0"
home = "0.5.12"
opaque-ke = { version = "4.1.0-pre.1", features = ["argon2", "ed25519", "std"] }
